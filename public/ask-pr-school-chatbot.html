<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask PR School Chatbot</title>
  <style>
    :root {
      /* Admin branding: update these colors to match school branding */
      --bg-1: #f5f9ff;
      --bg-2: #eaf2ff;
      --surface: #ffffff;
      --surface-muted: #f3f7ff;
      --text: #10213a;
      --text-muted: #4a5d7a;
      --primary: #0d4ea6;
      --primary-strong: #0a3f88;
      --bot-bubble: #eef4ff;
      --user-bubble: #0d4ea6;
      --user-text: #ffffff;
      --border: #d9e4f8;
      --shadow: 0 10px 35px rgba(15, 35, 70, 0.15);
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --transition: 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(13, 78, 166, 0.08), transparent 32%),
        radial-gradient(circle at 90% 88%, rgba(53, 130, 255, 0.1), transparent 35%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }

    .chat-launcher {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 62px;
      height: 62px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--primary), #1660c7);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      z-index: 999;
    }

    .chat-launcher:hover,
    .chat-launcher:focus-visible {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 35px rgba(13, 78, 166, 0.32);
      outline: none;
    }

    .chat-panel {
      position: fixed;
      right: 20px;
      bottom: 96px;
      width: min(380px, calc(100vw - 24px));
      height: min(640px, calc(100vh - 120px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 1000;
    }

    .chat-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      color: #fff;
      background: linear-gradient(120deg, var(--primary), #1d66cc);
    }

    .chat-header h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 700;
    }

    .chat-header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .chat-close {
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: background var(--transition), transform var(--transition);
    }

    .chat-close:hover,
    .chat-close:focus-visible {
      background: rgba(255, 255, 255, 0.28);
      transform: scale(1.04);
      outline: none;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: linear-gradient(180deg, #fbfdff, #f5f9ff);
      scroll-behavior: smooth;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      line-height: 1.45;
      font-size: 0.93rem;
      animation: slide-up 0.24s ease-out;
      word-break: break-word;
    }

    .message.bot {
      align-self: flex-start;
      border: 1px solid #dce8ff;
      background: var(--bot-bubble);
      color: var(--text);
      border-top-left-radius: 6px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--user-text);
      border-top-right-radius: 6px;
    }

    .meta {
      margin-top: 4px;
      font-size: 0.7rem;
      opacity: 0.75;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 42px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6f87ad;
      animation: blink 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.16s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.32s;
    }

    .faq-chips {
      margin: 8px 0 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid #cdddf8;
      background: #fff;
      color: var(--primary-strong);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.76rem;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }

    .chip:hover,
    .chip:focus-visible {
      background: #eaf2ff;
      border-color: #8db3ef;
      transform: translateY(-1px);
      outline: none;
    }

    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-input {
      flex: 1;
      border: 1px solid #c7d7f3;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 0.93rem;
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .chat-input:focus-visible {
      outline: none;
      border-color: #6a99e7;
      box-shadow: 0 0 0 3px rgba(22, 96, 199, 0.12);
    }

    .send-btn {
      border: 0;
      border-radius: 12px;
      min-width: 52px;
      padding: 11px 12px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .send-btn:hover,
    .send-btn:focus-visible {
      background: var(--primary-strong);
      transform: translateY(-1px);
      outline: none;
    }

    @media (max-width: 640px) {
      .chat-panel {
        right: 10px;
        left: 10px;
        width: auto;
        bottom: 88px;
        height: min(78vh, 640px);
      }

      .chat-launcher {
        right: 12px;
        bottom: 12px;
      }
    }

    @keyframes blink {
      0%, 80%, 100% {
        transform: scale(0.9);
        opacity: 0.5;
      }

      40% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(7px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <button
    class="chat-launcher"
    id="chatLauncher"
    type="button"
    aria-label="Open Ask PR School chatbot"
    title="Ask PR School"
  >💬</button>

  <section class="chat-panel" id="chatPanel" aria-label="Ask PR School Chat" aria-live="polite">
    <header class="chat-header">
      <div>
        <h1>Ask PR School</h1>
        <p>Instant answers for parents, students, and visitors</p>
      </div>
      <button class="chat-close" id="chatClose" type="button" aria-label="Close chatbot">✕</button>
    </header>

    <div class="chat-body" id="chatBody">
      <div class="messages" id="messages"></div>
      <div class="faq-chips" id="faqChips" aria-label="Suggested questions"></div>
    </div>

    <form class="chat-input-row" id="chatForm" autocomplete="off">
      <label for="chatInput" class="sr-only" style="position:absolute;left:-9999px;">Type your question</label>
      <input
        id="chatInput"
        class="chat-input"
        type="text"
        placeholder="Ask about admission, fees, timing..."
        maxlength="260"
      />
      <button class="send-btn" type="submit" aria-label="Send message">Send</button>
    </form>
  </section>

  <script>
    // Admin editable: school name and core chatbot settings.
    const CHATBOT_CONFIG = {
      schoolName: "PR School",
      typingDelayMs: 700,
      showTimestamps: true,
      fallback:
        "Sorry, I do not have that information right now. Please contact PR School directly."
    };

    // Admin editable FAQ knowledge base.
    // Add or remove FAQ entries by changing this array.
    const FAQS = [
      {
        id: "about",
        question: "About school",
        answer:
          "PR School is committed to quality education, discipline, values, and overall student development.",
        keywords: ["about", "school", "vision", "mission", "information"]
      },
      {
        id: "admission",
        question: "Admission process",
        answer:
          "To take admission, visit the school office, collect the admission form, submit required documents, and complete the fee process. If online admission is available, students can apply through the website.",
        keywords: ["admission", "enroll", "enrol", "apply", "application", "process", "join"]
      },
      {
        id: "documents",
        question: "Required documents",
        answer:
          "Admission documents usually include birth certificate, previous marksheet or transfer certificate, passport-size photographs, Aadhaar card, and parent identity proof.",
        keywords: ["documents", "document", "required", "birth certificate", "marksheet", "tc", "transfer"]
      },
      {
        id: "timing",
        question: "School timing",
        answer:
          "School timing is 8:00 AM to 2:00 PM, Monday to Friday. Please confirm with the school office for updated timing.",
        keywords: ["timing", "time", "hours", "open", "closing", "schedule", "school time"]
      },
      {
        id: "fees",
        question: "Fee payment",
        answer:
          "Fees can be paid at the school office or through the online payment system if available on the website.",
        keywords: ["fee", "fees", "payment", "pay", "charges", "installment"]
      },
      {
        id: "transport",
        question: "Transport facility",
        answer:
          "Transport facility is available for selected routes. Please contact the school office for route and fee details.",
        keywords: ["transport", "bus", "pickup", "drop", "route", "van"]
      },
      {
        id: "classes",
        question: "Classes available",
        answer: "PR School offers classes from Nursery to Class 10. Update this answer as needed.",
        keywords: ["classes", "class", "grade", "nursery", "10", "levels", "standards"]
      },
      {
        id: "facilities",
        question: "Facilities",
        answer:
          "The school provides classrooms, library, computer lab, sports activities, and co-curricular development programs.",
        keywords: ["facilities", "library", "lab", "sports", "activities", "campus", "infrastructure"]
      },
      {
        id: "contact",
        question: "Contact information",
        answer:
          "You can contact the school through the contact page, office phone number, or official school email.",
        keywords: ["contact", "phone", "email", "call", "reach", "address"]
      },
      {
        id: "office",
        question: "Office help",
        answer: "For personal support, please visit the school office during working hours.",
        keywords: ["office", "help", "support", "visit", "working hours"]
      },
      {
        id: "results",
        question: "Exam results",
        answer:
          "Exam results are shared by the school through report cards, student portal, or official communication channels.",
        keywords: ["result", "results", "exam", "report card", "marks", "portal"]
      },
      {
        id: "holidays",
        question: "Holidays",
        answer:
          "Holiday information is shared through the school calendar, notice board, or website announcements.",
        keywords: ["holiday", "holidays", "vacation", "calendar", "leave"]
      },
      {
        id: "uniform",
        question: "Uniform",
        answer:
          "Students are expected to follow the prescribed school uniform. Please contact the office for uniform details.",
        keywords: ["uniform", "dress", "school dress", "code"]
      },
      {
        id: "principal",
        question: "Principal meeting",
        answer:
          "To meet the principal, please contact the school office and schedule an appointment.",
        keywords: ["principal", "meeting", "appointment", "head", "headmaster"]
      }
    ];

    const launcher = document.getElementById("chatLauncher");
    const panel = document.getElementById("chatPanel");
    const closeButton = document.getElementById("chatClose");
    const chatBody = document.getElementById("chatBody");
    const messagesContainer = document.getElementById("messages");
    const chipsContainer = document.getElementById("faqChips");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");

    function nowTimestamp() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function normalizeText(value) {
      return value.toLowerCase().trim().replace(/\s+/g, " ");
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function createMessageElement(text, sender, isTyping) {
      const item = document.createElement("article");
      item.className = `message ${sender}`;

      if (isTyping) {
        item.innerHTML =
          '<span class="typing" aria-label="Bot is typing"><span></span><span></span><span></span></span>';
        return item;
      }

      const content = document.createElement("div");
      content.textContent = text;
      item.appendChild(content);

      if (CHATBOT_CONFIG.showTimestamps) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = nowTimestamp();
        item.appendChild(meta);
      }

      return item;
    }

    function addMessage(text, sender) {
      const node = createMessageElement(text, sender, false);
      messagesContainer.appendChild(node);
      scrollToBottom();
    }

    function addTypingIndicator() {
      const typingNode = createMessageElement("", "bot", true);
      typingNode.id = "typingIndicator";
      messagesContainer.appendChild(typingNode);
      scrollToBottom();
      return typingNode;
    }

    function removeTypingIndicator() {
      const node = document.getElementById("typingIndicator");
      if (node) {
        node.remove();
      }
    }

    function matchesFaq(input, faq) {
      const normalizedQuestion = normalizeText(faq.question);

      // Exact style keyword/question match.
      if (input === normalizedQuestion) {
        return true;
      }

      // Exact keyword match.
      if (faq.keywords.some((kw) => input === normalizeText(kw))) {
        return true;
      }

      // Partial matching when full phrase isn't provided.
      if (faq.keywords.some((kw) => input.includes(normalizeText(kw)) || normalizeText(kw).includes(input))) {
        return true;
      }

      return false;
    }

    function findBestAnswer(userText) {
      const normalizedInput = normalizeText(userText);
      if (!normalizedInput) {
        return "Please type your question so I can help you.";
      }

      const matchedFaq = FAQS.find((faq) => matchesFaq(normalizedInput, faq));
      return matchedFaq ? matchedFaq.answer : CHATBOT_CONFIG.fallback;
    }

    function renderFaqChips() {
      const topSuggestions = [
        "Admission process",
        "Fee payment",
        "School timing",
        "Transport facility",
        "Principal meeting",
        "Uniform"
      ];

      chipsContainer.innerHTML = "";

      topSuggestions.forEach((label) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.textContent = label;
        chip.addEventListener("click", () => {
          handleUserMessage(label);
        });
        chipsContainer.appendChild(chip);
      });
    }

    function botReply(userMessage) {
      const typingNode = addTypingIndicator();

      window.setTimeout(() => {
        if (typingNode) {
          removeTypingIndicator();
        }
        addMessage(findBestAnswer(userMessage), "bot");
      }, CHATBOT_CONFIG.typingDelayMs);
    }

    function handleUserMessage(text) {
      const normalized = normalizeText(text);
      if (!normalized) {
        return;
      }

      addMessage(text.trim(), "user");
      botReply(text);
      chatInput.value = "";
      chatInput.focus();
    }

    function openChat() {
      panel.classList.add("open");
      launcher.setAttribute("aria-expanded", "true");
      chatInput.focus();
      scrollToBottom();
    }

    function closeChat() {
      panel.classList.remove("open");
      launcher.setAttribute("aria-expanded", "false");
      launcher.focus();
    }

    function initChatbot() {
      launcher.setAttribute("aria-expanded", "false");

      addMessage(
        `Hello! Welcome to ${CHATBOT_CONFIG.schoolName}. I can help with admission, fees, timing, transport, classes, and more.`,
        "bot"
      );
      renderFaqChips();

      launcher.addEventListener("click", () => {
        if (panel.classList.contains("open")) {
          closeChat();
        } else {
          openChat();
        }
      });

      closeButton.addEventListener("click", closeChat);

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        handleUserMessage(chatInput.value);
      });

      chatInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleUserMessage(chatInput.value);
        }
      });
    }

    initChatbot();
  </script>
</body>
</html>
